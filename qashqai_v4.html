<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nissan Qashqai</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #0f0f13; color: #e8e6e1; }

.header { background: #1a1a24; border-bottom: 1px solid #2a2a3a; padding: 16px 16px 0; position: sticky; top: 0; z-index: 10; }
.car-title { font-size: 18px; font-weight: 800; color: #fff; }
.car-sub { font-size: 12px; color: #6b6b80; margin-bottom: 14px; margin-top: 2px; }
.tabs { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 10px 14px; font-size: 13px; font-weight: 600; border: none; background: none; color: #6b6b80; border-bottom: 2px solid transparent; font-family: inherit; cursor: pointer; }
.tab.active { color: #fff; border-bottom-color: #e74c3c; }

.sync-bar { background: #1a1a24; border-bottom: 1px solid #2a2a3a; padding: 6px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #6b6b80; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #6b6b80; margin-right: 6px; display: inline-block; flex-shrink: 0; }
.sync-dot.green { background: #2ecc71; }
.sync-dot.red { background: #e74c3c; }
.sync-dot.yellow { background: #f1c40f; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

.page { display: none; padding: 16px; max-width: 600px; margin: 0 auto; padding-bottom: 40px; }
.page.active { display: block; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card { background: #1a1a24; border-radius: 10px; padding: 14px; border: 1px solid #2a2a3a; text-align: center; }
.stat-num { font-size: 22px; font-weight: 800; }
.stat-lbl { font-size: 11px; color: #6b6b80; margin-top: 4px; }

.alert-box { background: rgba(231,76,60,.1); border: 1px solid rgba(231,76,60,.3); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
.alert-ttl { font-size: 11px; font-weight: 700; color: #e74c3c; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.alert-row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }

.card { background: #1a1a24; border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid #2a2a3a; }
.card-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #6b6b80; margin-bottom: 10px; }

.irow { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #22222e; }
.irow:last-child { border-bottom: none; padding-bottom: 0; }
.irow-icon { font-size: 22px; width: 30px; text-align: center; flex-shrink: 0; }
.irow-info { flex: 1; min-width: 0; }
.irow-title { font-size: 14px; font-weight: 600; }
.irow-sub { font-size: 12px; color: #6b6b80; margin-top: 2px; }

.badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; }
.badge-green { background: rgba(46,204,113,.15); color: #2ecc71; border: 1px solid rgba(46,204,113,.3); }
.badge-red { background: rgba(231,76,60,.15); color: #e74c3c; border: 1px solid rgba(231,76,60,.3); }
.badge-orange { background: rgba(230,126,34,.15); color: #e67e22; border: 1px solid rgba(230,126,34,.3); }
.badge-yellow { background: rgba(241,196,15,.15); color: #f1c40f; border: 1px solid rgba(241,196,15,.3); }

.sec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.sec-title { font-size: 16px; font-weight: 700; }
.btn-add { background: #e74c3c; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }

/* FILTRI */
.filtri-bar { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
.filtri-bar::-webkit-scrollbar { display: none; }
.filtro-btn { flex-shrink: 0; padding: 6px 12px; font-size: 12px; font-weight: 600; border: 1px solid #2a2a3a; border-radius: 20px; background: none; color: #6b6b80; font-family: inherit; cursor: pointer; }
.filtro-btn.active { background: #e74c3c22; border-color: #e74c3c; color: #e74c3c; }

.item-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #22222e; flex-wrap: wrap; }
.btn-sm { background: none; border: 1px solid #2a2a3a; border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 600; color: #aaa; font-family: inherit; cursor: pointer; }
.btn-sm-green { color: #2ecc71; border-color: rgba(46,204,113,.3); }
.btn-sm-red { color: #e74c3c; border-color: rgba(231,76,60,.3); }
.btn-sm-blue { color: #3498db; border-color: rgba(52,152,219,.3); }

/* FOTO */
.foto-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #2a2a3a; cursor: pointer; }
.foto-placeholder { width: 60px; height: 60px; border-radius: 8px; border: 1px dashed #2a2a3a; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; flex-shrink: 0; background: #0f0f13; }
.foto-caricamento { width: 60px; height: 60px; border-radius: 8px; border: 1px solid #2a2a3a; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #6b6b80; flex-shrink: 0; background: #0f0f13; text-align: center; }

/* MODAL */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #1a1a24; border-radius: 18px 18px 0 0; padding: 20px 16px 34px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; border: 1px solid #2a2a3a; -webkit-overflow-scrolling: touch; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.f-lbl { font-size: 11px; color: #6b6b80; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 4px; display: block; }
.f-in { width: 100%; background: #0f0f13; border: 1px solid #2a2a3a; border-radius: 8px; padding: 12px; color: #e8e6e1; font-size: 16px; margin-bottom: 12px; font-family: inherit; outline: none; -webkit-appearance: none; appearance: none; }
.icon-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.icon-btn { font-size: 20px; background: none; border: 1px solid #2a2a3a; border-radius: 8px; padding: 6px 10px; cursor: pointer; }
.icon-btn.sel { background: rgba(231,76,60,.15); border-color: #e74c3c; }
.btn-save { width: 100%; background: #e74c3c; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 4px; }
.btn-cancel { width: 100%; background: none; color: #6b6b80; border: 1px solid #2a2a3a; border-radius: 10px; padding: 12px; font-size: 14px; font-family: inherit; cursor: pointer; margin-top: 8px; }

/* FOTO MODAL */
.foto-upload-area { border: 2px dashed #2a2a3a; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 12px; background: #0f0f13; }
.foto-upload-area:active { border-color: #e74c3c; }
.foto-preview-modal { width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; margin-bottom: 12px; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.95); z-index: 200; align-items: center; justify-content: center; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
.lightbox-close { position: absolute; top: 16px; right: 16px; font-size: 28px; color: #fff; cursor: pointer; background: none; border: none; }

.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); padding: 9px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; z-index: 999; display: none; white-space: nowrap; }
.toast.ok { background: #2ecc71; color: #fff; }
.toast.err { background: #e74c3c; color: #fff; }
.toast.info { background: #3498db; color: #fff; }

.empty { text-align: center; padding: 40px 20px; color: #6b6b80; font-size: 14px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #2a2a3a; border-top-color: #e74c3c; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
    <span style="font-size:24px">🚙</span>
    <div>
      <div class="car-title">Nissan Qashqai</div>
      <div class="car-sub" id="car-sub">caricamento...</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-btn-dash" onclick="showPage('dash')">📊 Dashboard</button>
    <button class="tab" id="tab-btn-sc" onclick="showPage('sc')">📅 Scadenze</button>
    <button class="tab" id="tab-btn-man" onclick="showPage('man')">🔧 Manutenzioni</button>
    <button class="tab" id="tab-btn-auto" onclick="showPage('auto')">⚙️ Auto</button>
  </div>
</div>

<div class="sync-bar">
  <div style="display:flex;align-items:center">
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-txt">Connessione...</span>
  </div>
  <button onclick="sincronizza()" style="background:none;border:none;color:#6b6b80;font-size:12px;cursor:pointer;font-family:inherit">🔄 Sincronizza</button>
</div>

<div class="page active" id="page-dash"></div>
<div class="page" id="page-sc"></div>
<div class="page" id="page-man"></div>
<div class="page" id="page-auto"></div>

<!-- Modal Scadenza -->
<div class="modal-bg" id="modal-sc">
  <div class="modal">
    <div class="modal-title" id="modal-sc-title">Nuova Scadenza</div>
    <input type="hidden" id="sc-edit-id">
    <label class="f-lbl">TIPO</label>
    <input class="f-in" id="sc-tipo" placeholder="Bollo, Assicurazione, Revisione…">
    <label class="f-lbl">ICONA</label>
    <div class="icon-row" id="sc-icons">
      <button class="icon-btn sel" type="button" onclick="selIcon(this,'sc-icons')">📋</button>
      <button class="icon-btn" type="button" onclick="selIcon(this,'sc-icons')">🛡️</button>
      <button class="icon-btn" type="button" onclick="selIcon(this,'sc-icons')">🔍</button>
      <button class="icon-btn" type="button" onclick="selIcon(this,'sc-icons')">💳</button>
      <button class="icon-btn" type="button" onclick="selIcon(this,'sc-icons')">🏷️</button>
      <button class="icon-btn" type="button" onclick="selIcon(this,'sc-icons')">📄</button>
      <button class="icon-btn" type="button" onclick="selIcon(this,'sc-icons')">🚗</button>
      <button class="icon-btn" type="button" onclick="selIcon(this,'sc-icons')">⚙️</button>
    </div>
    <label class="f-lbl">DATA SCADENZA</label>
    <input class="f-in" id="sc-data" type="date">
    <label class="f-lbl">IMPORTO €</label>
    <input class="f-in" id="sc-importo" type="number" inputmode="decimal" placeholder="0">
    <label class="f-lbl">NOTE</label>
    <input class="f-in" id="sc-note" placeholder="Note aggiuntive…">
    <button class="btn-save" type="button" onclick="salvaScadenza()">💾 Salva</button>
    <button class="btn-cancel" type="button" onclick="chiudiModal('modal-sc')">Annulla</button>
  </div>
</div>

<!-- Modal Manutenzione -->
<div class="modal-bg" id="modal-man">
  <div class="modal">
    <div class="modal-title" id="modal-man-title">Nuovo Intervento</div>
    <input type="hidden" id="man-edit-id">
    <label class="f-lbl">TIPO INTERVENTO</label>
    <input class="f-in" id="man-tipo" placeholder="Tagliando, Cambio gomme, Freni…">
    <label class="f-lbl">DATA</label>
    <input class="f-in" id="man-data" type="date">
    <label class="f-lbl">CHILOMETRI</label>
    <input class="f-in" id="man-km" type="number" inputmode="numeric" placeholder="km">
    <label class="f-lbl">COSTO €</label>
    <input class="f-in" id="man-costo" type="number" inputmode="decimal" placeholder="0">
    <label class="f-lbl">OFFICINA</label>
    <input class="f-in" id="man-officina" placeholder="Nome officina">
    <label class="f-lbl">NOTE</label>
    <input class="f-in" id="man-note" placeholder="Dettagli lavori…">
    <label class="f-lbl">📸 FOTO SCONTRINO</label>
    <div class="foto-upload-area" onclick="document.getElementById('man-foto-input').click()">
      <img id="man-foto-preview" class="foto-preview-modal" style="display:none">
      <div id="man-foto-placeholder">
        <div style="font-size:32px;margin-bottom:6px">📸</div>
        <div style="font-size:13px;color:#6b6b80">Tocca per aggiungere foto scontrino</div>
      </div>
    </div>
    <input type="file" id="man-foto-input" accept="image/*" capture="environment" style="display:none" onchange="anteprimaFoto(this)">
    <input type="hidden" id="man-foto-data">
    <input type="hidden" id="man-foto-tipo">
    <button class="btn-save" type="button" onclick="salvaManutenzione()">💾 Salva</button>
    <button class="btn-cancel" type="button" onclick="chiudiModal('modal-man')">Annulla</button>
  </div>
</div>

<!-- Lightbox foto -->
<div class="lightbox" id="lightbox" onclick="chiudiLightbox()">
  <button class="lightbox-close" onclick="chiudiLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="Scontrino">
</div>

<div class="toast" id="toast"></div>

<script type="text/javascript">
(function() {

var GAS_URL = 'https://script.google.com/macros/s/AKfycbw1WR4IVrp7kp1rHc_CddCRJP4eTKmWWHP4mYa-y1kmxupT5mOKa9b0Eg0GD32Z__vk/exec';
var CACHE_KEY = 'qashqai_v4';
var currentTab = 'dash';
var filtroAttivo = 'tutti';

var datiDefault = {
  auto: { targa: 'XX000XX', anno: 2020, km: 45000 },
  scadenze: [
    { id: 1, tipo: 'Bollo', scadenza: '2025-06-30', importo: 210, pagato: false, icon: '📋', note: '' },
    { id: 2, tipo: 'Assicurazione RCA', scadenza: '2025-09-15', importo: 680, pagato: false, icon: '🛡️', note: '' },
    { id: 3, tipo: 'Revisione', scadenza: '2026-03-01', importo: 65, pagato: false, icon: '🔍', note: '' }
  ],
  manutenzioni: [
    { id: 1, tipo: 'Tagliando', data: '2024-09-10', km: 40000, costo: 320, officina: 'AutoCenter', note: 'Olio 5W30, filtri', fotoId: null },
    { id: 2, tipo: 'Cambio gomme', data: '2024-11-05', km: 42000, costo: 80, officina: 'Gommista Rossi', note: 'Invernali', fotoId: null }
  ]
};

var dati;
try {
  var c = localStorage.getItem(CACHE_KEY);
  dati = c ? JSON.parse(c) : datiDefault;
} catch(e) { dati = datiDefault; }

// Cache foto in memoria
var fotoCache = {};

function setSyncStatus(stato, testo) {
  var dot = document.getElementById('sync-dot');
  var txt = document.getElementById('sync-txt');
  dot.className = 'sync-dot ' + stato;
  txt.textContent = testo;
}

function showToast(msg, tipo) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (tipo || 'ok');
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 2500);
}

function cacheLocale() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(dati)); } catch(e) {}
}

window.sincronizza = function() {
  setSyncStatus('yellow', 'Sincronizzazione...');
  fetch(GAS_URL + '?action=leggi')
    .then(function(r){ return r.text(); })
    .then(function(testo) {
      if (testo && testo !== 'null' && testo.trim() !== '') {
        try {
          var remoto = JSON.parse(testo);
          if (remoto && remoto.auto) {
            dati = remoto;
            // Ricarica fotoCache da dati
            dati.manutenzioni.forEach(function(m){ if(m.fotoId && m.fotoData) fotoCache[m.fotoId]=m.fotoData; });
            cacheLocale();
            render();
            aggiornaTestoAuto();
            setSyncStatus('green', 'Sincronizzato ✓');
            showToast('✓ Dati caricati da Google Drive');
          } else { salvaRemoto(); }
        } catch(e) { salvaRemoto(); }
      } else { salvaRemoto(); }
    })
    .catch(function() {
      setSyncStatus('red', 'Offline — dati locali');
      showToast('⚠️ Offline, uso dati locali', 'err');
    });
};

function salvaRemoto() {
  setSyncStatus('yellow', 'Salvataggio...');
  fetch(GAS_URL + '?action=salva&dati=' + encodeURIComponent(JSON.stringify(dati)))
    .then(function(){ cacheLocale(); setSyncStatus('green', 'Salvato su Google Drive ✓'); showToast('✓ Salvato su Google Drive'); })
    .catch(function(){ cacheLocale(); setSyncStatus('red', 'Salvato solo in locale'); showToast('⚠️ Salvato solo in locale', 'err'); });
}

function salva() { cacheLocale(); salvaRemoto(); }

// Salva foto inline nel JSON (ridimensionata, nessun server)
function uploadFoto(base64, tipo, nomeFile, callback) {
  showToast('📤 Elaborazione foto...', 'info');
  var img = new Image();
  img.onload = function() {
    var canvas = document.createElement('canvas');
    var max = 900;
    var w = img.width, h = img.height;
    if (w > max || h > max) {
      if (w > h) { h = Math.round(h * max / w); w = max; }
      else { w = Math.round(w * max / h); h = max; }
    }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    var ridotta = canvas.toDataURL('image/jpeg', 0.72);
    var fotoId = 'foto_' + Date.now();
    fotoCache[fotoId] = ridotta;
    showToast('\u2713 Foto salvata!');
    callback(fotoId);
  };
  img.onerror = function() { showToast('\u26a0\ufe0f Errore foto', 'err'); callback(null); };
  img.src = base64;
}

// Foto inline: gia in cache come base64
function caricaFoto(fileId) { /* inline, gia in fotoCache */ }


window.apriLightbox = function(fileId) {
  var src = fotoCache[fileId];
  if (!src) return;
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
};

window.chiudiLightbox = function() {
  document.getElementById('lightbox').classList.remove('open');
};

window.anteprimaFoto = function(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('man-foto-data').value = e.target.result;
    document.getElementById('man-foto-tipo').value = file.type;
    var prev = document.getElementById('man-foto-preview');
    var ph = document.getElementById('man-foto-placeholder');
    prev.src = e.target.result;
    prev.style.display = 'block';
    if (ph) ph.style.display = 'none';
  };
  reader.readAsDataURL(file);
};

function giorni(str) {
  var oggi = new Date(); oggi.setHours(0,0,0,0);
  return Math.ceil((new Date(str) - oggi) / 86400000);
}

function testoBadge(g, pagato) {
  if (pagato) return '✓ Pagato';
  if (g < 0) return 'SCADUTO';
  if (g === 0) return 'Oggi!';
  return g + ' giorni';
}

function classeBadge(g, pagato) {
  if (pagato) return 'badge badge-green';
  if (g < 0) return 'badge badge-red';
  if (g < 30) return 'badge badge-orange';
  if (g < 90) return 'badge badge-yellow';
  return 'badge badge-green';
}

function formatData(s) {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('it-IT');
}

function formatNum(n) { return (+(n)||0).toLocaleString('it'); }

function aggiornaTestoAuto() {
  document.getElementById('car-sub').textContent = dati.auto.targa + ' · ' + dati.auto.anno + ' · ' + formatNum(dati.auto.km) + ' km';
}

window.showPage = function(nome) {
  ['dash','sc','man','auto'].forEach(function(p) {
    document.getElementById('page-'+p).classList.remove('active');
    document.getElementById('tab-btn-'+p).classList.remove('active');
  });
  document.getElementById('page-'+nome).classList.add('active');
  document.getElementById('tab-btn-'+nome).classList.add('active');
  currentTab = nome;
  render();
};

function render() {
  if (currentTab === 'dash') renderDash();
  else if (currentTab === 'sc') renderSc();
  else if (currentTab === 'man') renderMan();
  else if (currentTab === 'auto') renderAuto();
}

function renderDash() {
  var scOrd = dati.scadenze.slice().sort(function(a,b){ return new Date(a.scadenza)-new Date(b.scadenza); });
  var manOrd = dati.manutenzioni.slice().sort(function(a,b){ return new Date(b.data)-new Date(a.data); });
  var urgenti = dati.scadenze.filter(function(s){ return !s.pagato && giorni(s.scadenza) < 60; });
  var totSpeso = 0;
  dati.manutenzioni.forEach(function(m){ totSpeso += (+m.costo||0); });
  dati.scadenze.forEach(function(s){ if(s.pagato) totSpeso += (+s.importo||0); });
  var aperte = dati.scadenze.filter(function(s){ return !s.pagato; }).length;

  var h = '';
  if (urgenti.length > 0) {
    h += '<div class="alert-box"><div class="alert-ttl">⚠️ In scadenza presto</div>';
    urgenti.forEach(function(s) {
      var g = giorni(s.scadenza);
      var c = g<0?'#e74c3c':g<30?'#e67e22':'#f1c40f';
      h += '<div class="alert-row"><span>'+s.icon+' '+s.tipo+'</span><span style="color:'+c+';font-weight:700">'+(g<0?'SCADUTO':g===0?'Oggi!':g+' giorni')+'</span></div>';
    });
    h += '</div>';
  }

  h += '<div class="stat-grid">';
  h += '<div class="stat-card" style="border-color:rgba(231,76,60,.25)"><div class="stat-num" style="color:#e74c3c">'+dati.manutenzioni.length+'</div><div class="stat-lbl">Interventi</div></div>';
  h += '<div class="stat-card" style="border-color:rgba(230,126,34,.25)"><div class="stat-num" style="color:#e67e22">'+aperte+'</div><div class="stat-lbl">Scadenze aperte</div></div>';
  h += '<div class="stat-card" style="border-color:rgba(52,152,219,.25)"><div class="stat-num" style="color:#3498db;font-size:18px">€'+formatNum(totSpeso)+'</div><div class="stat-lbl">Totale speso</div></div>';
  h += '<div class="stat-card" style="border-color:rgba(46,204,113,.25)"><div class="stat-num" style="color:#2ecc71;font-size:18px">'+formatNum(dati.auto.km)+'</div><div class="stat-lbl">Chilometri</div></div>';
  h += '</div>';

  h += '<div class="card"><div class="card-lbl">Prossime Scadenze</div>';
  if (scOrd.length === 0) {
    h += '<div style="color:#6b6b80;font-size:13px;text-align:center;padding:8px">Nessuna scadenza</div>';
  } else {
    scOrd.slice(0,4).forEach(function(s) {
      var g = giorni(s.scadenza);
      h += '<div class="irow"><div class="irow-icon">'+s.icon+'</div><div class="irow-info"><div class="irow-title">'+s.tipo+'</div><div class="irow-sub">'+formatData(s.scadenza)+' · €'+s.importo+'</div></div><span class="'+classeBadge(g,s.pagato)+'">'+testoBadge(g,s.pagato)+'</span></div>';
    });
  }
  h += '</div>';

  if (manOrd.length > 0) {
    var m = manOrd[0];
    h += '<div class="card"><div class="card-lbl">Ultimo Intervento</div>';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    h += '<div><div style="font-size:14px;font-weight:700">'+m.tipo+'</div>';
    h += '<div style="font-size:12px;color:#6b6b80;margin-top:3px">📅 '+formatData(m.data)+' · 🔢 '+formatNum(m.km)+' km</div>';
    if (m.officina) h += '<div style="font-size:12px;color:#6b6b80">🏪 '+m.officina+'</div>';
    if (m.note) h += '<div style="font-size:12px;color:#8888a0;margin-top:3px;font-style:italic">'+m.note+'</div>';
    h += '</div><div style="font-size:17px;font-weight:800;color:#e74c3c;margin-left:10px">€'+m.costo+'</div></div></div>';
  }

  document.getElementById('page-dash').innerHTML = h;
}

function renderSc() {
  var sc = dati.scadenze.slice().sort(function(a,b){ return new Date(a.scadenza)-new Date(b.scadenza); });
  var h = '<div class="sec-header"><div class="sec-title">Scadenze & Documenti</div><button class="btn-add" type="button" onclick="apriModalSc()">+ Aggiungi</button></div>';
  if (sc.length === 0) {
    h += '<div class="empty">📅<br><br>Nessuna scadenza registrata.</div>';
  } else {
    sc.forEach(function(s) {
      var g = giorni(s.scadenza);
      h += '<div class="card"><div style="display:flex;align-items:center;gap:10px"><div style="font-size:26px">'+s.icon+'</div>';
      h += '<div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;align-items:center;gap:6px">';
      h += '<div style="font-size:14px;font-weight:700">'+s.tipo+'</div><span class="'+classeBadge(g,s.pagato)+'">'+testoBadge(g,s.pagato)+'</span></div>';
      h += '<div style="font-size:12px;color:#6b6b80;margin-top:2px">Scade: '+formatData(s.scadenza)+' · <span style="color:#e8e6e1">€'+s.importo+'</span></div>';
      if (s.note) h += '<div style="font-size:12px;color:#8888a0;margin-top:2px;font-style:italic">'+s.note+'</div>';
      h += '</div></div>';
      h += '<div class="item-actions">';
      h += '<button class="btn-sm '+(s.pagato?'btn-sm-green':'')+'" type="button" onclick="togglePag('+s.id+')">'+(s.pagato?'✓ Pagato':'⬜ Segna pagato')+'</button>';
      h += '<button class="btn-sm" type="button" onclick="apriEditSc('+s.id+')">✏️ Modifica</button>';
      h += '<button class="btn-sm btn-sm-red" type="button" onclick="eliminaSc('+s.id+')">🗑️</button>';
      h += '</div></div>';
    });
  }
  document.getElementById('page-sc').innerHTML = h;
}

function getTipiManutenzione() {
  var tipi = {};
  dati.manutenzioni.forEach(function(m){ tipi[m.tipo] = true; });
  return Object.keys(tipi);
}

function renderMan() {
  var tipi = getTipiManutenzione();
  var mn = dati.manutenzioni.slice().sort(function(a,b){ return new Date(b.data)-new Date(a.data); });

  // Applica filtro
  if (filtroAttivo !== 'tutti') {
    mn = mn.filter(function(m){ return m.tipo === filtroAttivo; });
  }

  var h = '<div class="sec-header"><div class="sec-title">Storico Manutenzioni</div><button class="btn-add" type="button" onclick="apriModalMan()">+ Aggiungi</button></div>';

  // Barra filtri
  h += '<div class="filtri-bar">';
  h += '<button class="filtro-btn'+(filtroAttivo==='tutti'?' active':'')+'" onclick="setFiltro(\'tutti\')">🔧 Tutti</button>';
  tipi.forEach(function(t) {
    h += '<button class="filtro-btn'+(filtroAttivo===t?' active':'')+'" onclick="setFiltro(\''+t.replace(/'/g,"\\'")+'\')">';
    if (t.toLowerCase().indexOf('tagliand') >= 0) h += '🔩 ';
    else if (t.toLowerCase().indexOf('gomm') >= 0) h += '🛞 ';
    else if (t.toLowerCase().indexOf('freni') >= 0) h += '🔴 ';
    else if (t.toLowerCase().indexOf('batteria') >= 0) h += '🔋 ';
    else h += '⚙️ ';
    h += t + '</button>';
  });
  h += '</div>';

  if (mn.length === 0) {
    h += '<div class="empty">🔧<br><br>Nessun intervento'+(filtroAttivo!=='tutti'?' per questo tipo':'')+'.</div>';
  } else {
    mn.forEach(function(m) {
      h += '<div class="card">';
      h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">';
      h += '<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700">'+m.tipo+'</div>';
      h += '<div style="font-size:12px;color:#6b6b80;margin-top:3px">📅 '+formatData(m.data)+' · 🔢 '+formatNum(m.km)+' km</div>';
      if (m.officina) h += '<div style="font-size:12px;color:#6b6b80">🏪 '+m.officina+'</div>';
      if (m.note) h += '<div style="font-size:12px;color:#8888a0;margin-top:3px;font-style:italic">'+m.note+'</div>';
      h += '</div>';
      h += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">';
      h += '<div style="font-size:17px;font-weight:800;color:#e74c3c">€'+m.costo+'</div>';
      // Foto
      if (m.fotoId) {
        h += '<div data-fotoid="'+m.fotoId+'" style="width:60px;height:60px">';
        if (fotoCache[m.fotoId]) {
          h += '<img src="'+fotoCache[m.fotoId]+'" class="foto-thumb" onclick="apriLightbox(\''+m.fotoId+'\')" alt="Scontrino">';
        } else {
          h += '<div class="foto-caricamento"><span class="spinner"></span></div>';
        }
        h += '</div>';
      } else {
        h += '<div style="width:60px;height:60px;border-radius:8px;border:1px dashed #2a2a3a;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;background:#0f0f13" onclick="aggiungiFotoAIntervento('+m.id+')" title="Aggiungi foto">📸</div>';
      }
      h += '</div></div>';
      h += '<div class="item-actions">';
      h += '<button class="btn-sm" type="button" onclick="apriEditMan('+m.id+')">✏️ Modifica</button>';
      if (m.fotoId) h += '<button class="btn-sm btn-sm-blue" type="button" onclick="apriLightbox(\''+m.fotoId+'\')">🖼️ Scontrino</button>';
      h += '<button class="btn-sm btn-sm-red" type="button" onclick="eliminaMan('+m.id+')">🗑️ Elimina</button>';
      h += '</div></div>';
    });
    var tot = mn.reduce(function(a,m){ return a+(+m.costo||0); }, 0);
    h += '<div style="text-align:right;font-size:13px;color:#6b6b80;padding:4px 2px 0">Totale'+(filtroAttivo!=='tutti'?' ('+filtroAttivo+')':'')+': <strong style="color:#e8e6e1">€'+formatNum(tot)+'</strong></div>';
  }

  document.getElementById('page-man').innerHTML = h;

  // Foto inline: ripristina fotoCache da fotoData
  mn.forEach(function(m) {
    if (m.fotoId && m.fotoData && !fotoCache[m.fotoId]) {
      fotoCache[m.fotoId] = m.fotoData;
    }
  });
}

window.setFiltro = function(tipo) {
  filtroAttivo = tipo;
  renderMan();
};

function renderAuto() {
  var h = '<div class="sec-title" style="margin-bottom:14px">⚙️ Dati della tua Auto</div>';
  h += '<div class="card">';
  h += '<label class="f-lbl">TARGA</label><input class="f-in" id="cfg-targa" value="'+dati.auto.targa+'">';
  h += '<label class="f-lbl">ANNO</label><input class="f-in" id="cfg-anno" type="number" inputmode="numeric" value="'+dati.auto.anno+'">';
  h += '<label class="f-lbl">CHILOMETRI ATTUALI</label><input class="f-in" id="cfg-km" type="number" inputmode="numeric" value="'+dati.auto.km+'">';
  h += '<button class="btn-save" type="button" onclick="salvaAuto()">💾 Salva dati auto</button>';
  h += '</div>';
  document.getElementById('page-auto').innerHTML = h;
}

window.salvaAuto = function() {
  var t = document.getElementById('cfg-targa');
  var a = document.getElementById('cfg-anno');
  var k = document.getElementById('cfg-km');
  if (t) dati.auto.targa = t.value.toUpperCase();
  if (a) dati.auto.anno = +a.value || dati.auto.anno;
  if (k) dati.auto.km = +k.value || dati.auto.km;
  salva(); aggiornaTestoAuto();
};

// Aggiungi foto a intervento esistente
window.aggiungiFotoAIntervento = function(id) {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  input.onchange = function() {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      var b64 = e.target.result;
      var tipo = file.type;
      var nome = 'scontrino_' + id + '_' + Date.now() + '.jpg';
      uploadFoto(b64, tipo, nome, function(fileId) {
        if (fileId) {
          dati.manutenzioni.forEach(function(m){ if(m.id===id){ m.fotoId=fileId; m.fotoData=fotoCache[fileId]; } });
          fotoCache[fileId] = b64;
          salva();
          renderMan();
        }
      });
    };
    reader.readAsDataURL(file);
  };
  input.click();
};

window.apriModalSc = function() {
  document.getElementById('modal-sc-title').textContent = 'Nuova Scadenza';
  document.getElementById('sc-edit-id').value = '';
  document.getElementById('sc-tipo').value = '';
  document.getElementById('sc-data').value = '';
  document.getElementById('sc-importo').value = '';
  document.getElementById('sc-note').value = '';
  document.querySelectorAll('#sc-icons .icon-btn').forEach(function(b,i){ b.className='icon-btn'+(i===0?' sel':''); });
  document.getElementById('modal-sc').classList.add('open');
};

window.apriEditSc = function(id) {
  var s = null;
  dati.scadenze.forEach(function(x){ if(x.id===id) s=x; });
  if (!s) return;
  document.getElementById('modal-sc-title').textContent = 'Modifica Scadenza';
  document.getElementById('sc-edit-id').value = id;
  document.getElementById('sc-tipo').value = s.tipo;
  document.getElementById('sc-data').value = s.scadenza;
  document.getElementById('sc-importo').value = s.importo;
  document.getElementById('sc-note').value = s.note||'';
  document.querySelectorAll('#sc-icons .icon-btn').forEach(function(b){ b.className='icon-btn'+(b.textContent===s.icon?' sel':''); });
  document.getElementById('modal-sc').classList.add('open');
};

window.salvaScadenza = function() {
  var tipo = document.getElementById('sc-tipo').value.trim();
  var data = document.getElementById('sc-data').value;
  if (!tipo||!data){ alert('Inserisci tipo e data'); return; }
  var iconEl = document.querySelector('#sc-icons .icon-btn.sel');
  var icon = iconEl ? iconEl.textContent : '📋';
  var editId = +document.getElementById('sc-edit-id').value;
  var obj = { tipo:tipo, scadenza:data, icon:icon, importo:+document.getElementById('sc-importo').value||0, note:document.getElementById('sc-note').value, pagato:false };
  if (editId) {
    var idx=-1; dati.scadenze.forEach(function(x,i){ if(x.id===editId) idx=i; });
    if(idx>=0){ obj.id=editId; obj.pagato=dati.scadenze[idx].pagato; dati.scadenze[idx]=obj; }
  } else { obj.id=Date.now(); dati.scadenze.push(obj); }
  salva(); chiudiModal('modal-sc'); renderSc(); renderDash();
};

window.togglePag = function(id) {
  dati.scadenze.forEach(function(s){ if(s.id===id) s.pagato=!s.pagato; });
  salva(); renderSc(); renderDash();
};

window.eliminaSc = function(id) {
  if(!confirm('Eliminare?')) return;
  dati.scadenze = dati.scadenze.filter(function(s){ return s.id!==id; });
  salva(); renderSc(); renderDash();
};

window.apriModalMan = function() {
  document.getElementById('modal-man-title').textContent = 'Nuovo Intervento';
  document.getElementById('man-edit-id').value = '';
  ['man-tipo','man-data','man-km','man-costo','man-officina','man-note'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('man-foto-data').value = '';
  document.getElementById('man-foto-tipo').value = '';
  var prev = document.getElementById('man-foto-preview');
  var ph = document.getElementById('man-foto-placeholder');
  prev.style.display = 'none'; prev.src = '';
  if (ph) ph.style.display = 'block';
  document.getElementById('modal-man').classList.add('open');
};

window.apriEditMan = function(id) {
  var m=null; dati.manutenzioni.forEach(function(x){ if(x.id===id) m=x; });
  if(!m) return;
  document.getElementById('modal-man-title').textContent = 'Modifica Intervento';
  document.getElementById('man-edit-id').value = id;
  document.getElementById('man-tipo').value = m.tipo;
  document.getElementById('man-data').value = m.data;
  document.getElementById('man-km').value = m.km;
  document.getElementById('man-costo').value = m.costo;
  document.getElementById('man-officina').value = m.officina||'';
  document.getElementById('man-note').value = m.note||'';
  document.getElementById('man-foto-data').value = '';
  var prev = document.getElementById('man-foto-preview');
  var ph = document.getElementById('man-foto-placeholder');
  if (m.fotoId && fotoCache[m.fotoId]) {
    prev.src = fotoCache[m.fotoId]; prev.style.display = 'block';
    if (ph) ph.style.display = 'none';
  } else {
    prev.style.display = 'none'; prev.src = '';
    if (ph) ph.style.display = 'block';
  }
  document.getElementById('modal-man').classList.add('open');
};

window.salvaManutenzione = function() {
  var tipo = document.getElementById('man-tipo').value.trim();
  var data = document.getElementById('man-data').value;
  if(!tipo||!data){ alert('Inserisci tipo e data'); return; }
  var editId = +document.getElementById('man-edit-id').value;
  var fotoData = document.getElementById('man-foto-data').value;
  var fotoTipo = document.getElementById('man-foto-tipo').value;

  var obj = { tipo:tipo, data:data, km:+document.getElementById('man-km').value||0, costo:+document.getElementById('man-costo').value||0, officina:document.getElementById('man-officina').value, note:document.getElementById('man-note').value, fotoId: null };

  // Mantieni fotoId esistente se non c'è nuova foto
  if (editId) {
    dati.manutenzioni.forEach(function(x){ if(x.id===editId) obj.fotoId = x.fotoId; });
  }

  function doSalva(fotoId) {
    if (fotoId) { obj.fotoId = fotoId; obj.fotoData = fotoCache[fotoId] || null; }
    if (editId) {
      var idx=-1; dati.manutenzioni.forEach(function(x,i){ if(x.id===editId) idx=i; });
      if(idx>=0){ obj.id=editId; dati.manutenzioni[idx]=obj; }
    } else { obj.id=Date.now(); dati.manutenzioni.push(obj); }
    salva(); chiudiModal('modal-man'); renderMan(); renderDash();
  }

  if (fotoData) {
    var nome = 'scontrino_' + (editId || Date.now()) + '.jpg';
    fotoCache['_tmp'] = fotoData;
    uploadFoto(fotoData, fotoTipo || 'image/jpeg', nome, function(fileId) {
      if (fileId) fotoCache[fileId] = fotoData;
      doSalva(fileId);
    });
  } else {
    doSalva(null);
  }
};

window.eliminaMan = function(id) {
  if(!confirm('Eliminare?')) return;
  dati.manutenzioni = dati.manutenzioni.filter(function(m){ return m.id!==id; });
  salva(); renderMan(); renderDash();
};

window.chiudiModal = function(id) { document.getElementById(id).classList.remove('open'); };
window.selIcon = function(btn, rowId) {
  document.querySelectorAll('#'+rowId+' .icon-btn').forEach(function(b){ b.className='icon-btn'; });
  btn.className='icon-btn sel';
};

document.getElementById('modal-sc').addEventListener('click', function(e){ if(e.target===this) chiudiModal('modal-sc'); });
document.getElementById('modal-man').addEventListener('click', function(e){ if(e.target===this) chiudiModal('modal-man'); });

aggiornaTestoAuto();
renderDash();
sincronizza();

})();
</script>
</body>
</html>
